<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>共振戰術大師看板 (MACD/量能整合版)</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #c9d1d9; --gold: #f1c40f; --up: #f85149; --down: #3fb950; --blue: #58a6ff;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .resonance { border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(241, 196, 15, 0.3); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price { font-size: 2.2em; font-weight: 800; font-family: 'Consolas'; }
        .status-tags { display: flex; gap: 5px; margin: 10px 0; }
        .tag { flex: 1; background: #21262d; padding: 4px 5px; border-radius: 5px; font-size: 0.75em; text-align: center; border: 1px solid #30363d; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85em; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .stats div { display: flex; justify-content: space-between; }
        .label { color: #8b949e; }
        .decision { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; }
        .buy { background: rgba(241, 196, 15, 0.15); color: var(--gold); border: 1px solid var(--gold); }
        .exit { background: rgba(248, 81, 73, 0.15); color: var(--up); border: 1px solid var(--up); }
    </style>
</head>
<body>

<h1 style="text-align:center; color: var(--gold); margin-bottom: 30px;">🚀 共振戰術大師：全面監控看板</h1>
<div id="dashboard" class="grid">數據分析中...</div>

<script>
    const CSV_URL = '您的公開CSV網址'; 

    async function updateDashboard() {
        try {
            const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            const col = {
                id:0, name:1, price:2, low9:3, high9:4, k:6, d:7, ma5:9, bias:11, wms:12, 
                macd:13, lastClose:15, volText:19, u:20, v:21, w:22, x:23, y:24
            };

            for(let i=1; i<rows.length; i++) {
                const r = rows[i];
                if(!r[col.id] || r[col.id].trim() === "") continue;

                const currentPrice = parseFloat(r[col.price]) || 0;
                const yesterdayClose = parseFloat(r[col.lastClose]) || 0;
                const macdTrend = r[col.macd] || "N/A";
                const volStatus = r[col.volText] || "觀測中";
                
                // 進場分
                const signals = [r[col.u], r[col.v], r[col.w], r[col.x], r[col.y]];
                const score = signals.filter(s => s && s.trim().toUpperCase() === 'YES').length;
                
                // 出場邏輯
                const isExit = parseFloat(r[col.wms]) > -20 || parseFloat(r[col.k]) < parseFloat(r[col.d]);

                dashboard.innerHTML += `
                    <div class="card ${score >= 4 ? 'resonance' : ''}">
                        <div class="header">
                            <div><b>${r[col.name]}</b><br><small style="color:#8b949e">${r[col.id]}</small></div>
                            <div class="price" style="color:${currentPrice >= yesterdayClose ? 'var(--up)' : 'var(--down)'}">
                                ${currentPrice.toFixed(2)}
                            </div>
                        </div>
                        
                        <div class="status-tags">
                            <div class="tag">📊 MACD: ${macdTrend}</div>
                            <div class="tag">📦 量能: ${volStatus}</div>
                        </div>

                        <div class="stats">
                            <div><span class="label">K / D</span><span>${parseFloat(r[col.k]).toFixed(1)}/${parseFloat(r[col.d]).toFixed(1)}</span></div>
                            <div><span class="label">威廉 %R</span><span>${parseFloat(r[col.wms]).toFixed(1)}</span></div>
                            <div><span class="label">5日乖離</span><span>${(parseFloat(r[col.bias])*100).toFixed(2)}%</span></div>
                            <div><span class="label">共振得分</span><span>${score}/5</span></div>
                        </div>

                        ${score >= 4 ? 
                            '<div class="decision buy">🎯 多頭共振：建議進場</div>' : 
                            (isExit ? '<div class="decision exit">🚨 警戒：滿足出場條件</div>' : '<div class="decision">⏳ 觀察中</div>')
                        }
                    </div>
                `;
            }
        } catch(e) { console.error(e); }
    }
    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>
</body>
</html>
