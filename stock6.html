<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 短線戰情室 - 資金共振修正版</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; line-height: 1.6; }
        .header { text-align: center; padding: 20px 0 30px; }
        .header h1 { margin: 0; color: #38bdf8; font-size: 2.2em; text-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border-top: 6px solid #475569; position: relative; transition: all 0.3s ease; }
        .card:hover { transform: translateY(-8px); }
        .card.red { border-top-color: #ef4444; }
        .card.blue { border-top-color: #3b82f6; }
        .card.green { border-top-color: #10b981; }
        
        .win-badge { position: absolute; top: -12px; right: 15px; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; padding: 6px 16px; border-radius: 30px; font-size: 0.85em; font-weight: 900; border: 2px solid #fff; }
        .trust-badge { position: absolute; top: 25px; right: 20px; background: #f472b6; color: #fff; padding: 3px 10px; border-radius: 6px; font-size: 0.7em; font-weight: bold; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .price { font-size: 2.8em; font-weight: 800; margin: 10px 0; color: #f43f5e; font-family: 'Courier New', monospace; }
        .kd-container { display: flex; justify-content: space-between; background: #334155; padding: 16px; border-radius: 14px; margin: 15px 0; }
        .extra-indicators { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; font-size: 0.75em; }
        .ind-box { background: rgba(15, 23, 42, 0.5); padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
        .ind-val { font-weight: bold; color: #38bdf8; }
        .val-good { color: #10b981; }
        .signal { padding: 14px; border-radius: 12px; font-weight: bold; text-align: center; font-size: 1.2em; margin-top: 15px; }
        .buy { background: #064e3b; color: #6ee7b7; } 
        .hold { background: #1e293b; color: #94a3b8; }
    </style>
</head>
<body>

<div class="header">
    <h1>投資戰情監控中心</h1>
    <div id="update-status">🚀 數據引擎啟動中...</div>
</div>

<div class="grid" id="stock-grid"></div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQI9cWbCYXiLFGXrnY0W58hsYR4Aral3PBL1Dg7FFe2UU_ad-IVhIwOakDwbBiCSfWaDY2l22EdOK_-/pub?gid=1186750941&single=true&output=csv';

    async function updateDashboard() {
        const grid = document.getElementById('stock-grid');
        try {
            const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            let rawData = await response.text();
            const rows = rawData.split(/\r?\n/).map(row => row.split(',').map(v => v.replace(/"/g, '').trim()));

            grid.innerHTML = '';
            for (let i = 1; i < rows.length; i++) {
                const col = rows[i];
                if (!col[0]) continue;

                const price = col[2];
                const kVal = parseFloat(col[6]) || 0;
                const biasVal = parseFloat(col[12]) || 0;
                const isTrendUp = (col[15] || "").toUpperCase() === "TRUE"; // 讀取 P 欄

                // 核心勝率邏輯
                let isHighWin = (kVal < 25 && isTrendUp);

                let sigClass = kVal < 20 ? 'buy' : 'hold';
                let sigTxt = kVal < 20 ? '✅ 超跌買入區' : '⚪ 觀望續抱';

                grid.innerHTML += `
                    <div class="card ${col[0].includes('2330') ? 'red' : 'blue'}">
                        ${isHighWin ? `<div class="win-badge">🔥 強力反彈訊號</div>` : ''}
                        ${isTrendUp ? `<div class="trust-badge">⚡ 動能連漲偵測</div>` : ''}
                        
                        <div style="font-size:0.8em; color:#94a3b8;">${col[0]}</div>
                        <div style="font-size:1.5em; font-weight:bold;">${col[1]}</div>
                        <div class="price">${price}</div>
                        
                        <div class="kd-container">
                            <div><span>K值</span><strong>${kVal.toFixed(2)}</strong></div>
                            <div><span>D值</span><strong>${parseFloat(col[7]).toFixed(2)}</strong></div>
                        </div>

                        <div class="extra-indicators">
                            <div class="ind-box"><span>5日乖離</span><span class="ind-val">${(biasVal * 100).toFixed(2)}%</span></div>
                            <div class="ind-box"><span>連漲動能</span><span class="ind-val ${isTrendUp ? 'val-good' : ''}">${isTrendUp ? '📈 轉強' : '---'}</span></div>
                        </div>

                        <div class="signal ${sigClass}">${sigTxt}</div>
                    </div>`;
            }
            document.getElementById('update-status').innerText = '✅ 同步時間：' + new Date().toLocaleTimeString();
        } catch (error) { console.error(error); }
    }
    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>
</body>
</html>
