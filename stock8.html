<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 短線戰情監控 - 穩定修復版</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; line-height: 1.6; }
        .header { text-align: center; padding: 20px 0 30px; }
        .header h1 { margin: 0; color: #38bdf8; font-size: 2.2em; text-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        
        .card { background: #1e293b; border-radius: 20px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border-top: 6px solid #475569; position: relative; transition: all 0.3s ease; }
        .card.red { border-top-color: #ef4444; }
        .card.blue { border-top-color: #3b82f6; }
        .card.green { border-top-color: #10b981; }

        .win-badge { position: absolute; top: -12px; right: 15px; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; padding: 6px 16px; border-radius: 30px; font-size: 0.85em; font-weight: 900; border: 2px solid #fff; }
        .trust-badge { position: absolute; top: 25px; right: 20px; background: #f472b6; color: #fff; padding: 3px 10px; border-radius: 6px; font-size: 0.7em; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .price { font-size: 2.8em; font-weight: 800; margin: 10px 0; color: #f43f5e; font-family: 'Courier New', monospace; }
        .kd-container { display: flex; justify-content: space-between; background: #334155; padding: 15px; border-radius: 14px; margin: 15px 0; }
        
        .strategy-box { margin-top: 15px; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid #334155; border-radius: 10px; font-size: 0.88em; }
        .strategy-label { color: #38bdf8; font-weight: bold; display: block; margin-bottom: 4px; }
        .val-danger { color: #ef4444 !important; font-weight: bold; }
        .val-success { color: #10b981 !important; font-weight: bold; }

        .extra-indicators { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .ind-box { background: rgba(15, 23, 42, 0.5); padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
        .ind-label { color: #94a3b8; font-size: 0.75em; display: block; }
        .ind-val { font-weight: bold; color: #38bdf8; }

        .signal { padding: 14px; border-radius: 12px; font-weight: bold; text-align: center; font-size: 1.2em; margin-top: 15px; }
        .buy { background: #064e3b; color: #6ee7b7; } 
        .hold { background: #1e293b; color: #94a3b8; }

        #update-status { font-size: 0.9em; color: #38bdf8; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .error-msg { background: #7f1d1d; color: white; padding: 20px; border-radius: 10px; text-align: center; margin: 20px auto; max-width: 600px; }
    </style>
</head>
<body>

<div class="header">
    <h1>ETF 投資實戰監控中心</h1>
    <div id="update-status">📡 正在從雲端擷取最新數據...</div>
</div>

<div class="grid" id="stock-grid"></div>

<script>
    // 請確認此 CSV 網址是否正確且已發佈
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQI9cWbCYXiLFGXrnY0W58hsYR4Aral3PBL1Dg7FFe2UU_ad-IVhIwOakDwbBiCSfWaDY2l22EdOK_-/pub?gid=1186750941&single=true&output=csv';

    async function updateDashboard() {
        const grid = document.getElementById('stock-grid');
        const status = document.getElementById('update-status');
        
        try {
            const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            if (!response.ok) throw new Error('無法擷取 CSV 資料，請檢查網址或發佈設定。');
            
            let rawData = await response.text();
            // 處理 CSV 格式與編碼
            const rows = rawData.split(/\r?\n/).filter(line => line.trim() !== "").map(row => {
                // 處理包含逗號的數值
                return row.split(',').map(v => v.replace(/"/g, '').trim());
            });

            if (rows.length < 2) throw new Error('試算表內無有效數據。');

            const header = rows[0];
            // 自動搜尋標題所在列索引，避免偏移
            const getIdx = (name) => header.findIndex(h => h.includes(name));
            
            const idx_ID = 0;
            const idx_Name = 1;
            const idx_Price = getIdx("價格") !== -1 ? getIdx("價格") : 2;
            const idx_K = getIdx("K值") !== -1 ? getIdx("K值") : 6;
            const idx_D = getIdx("D值") !== -1 ? getIdx("D值") : 7;
            const idx_Bias = getIdx("乖離") !== -1 ? getIdx("乖離") : 12;
            const idx_Trend = getIdx("連漲") !== -1 ? getIdx("連漲") : 15;

            grid.innerHTML = '';
            
            for (let i = 1; i < rows.length; i++) {
                const col = rows[i];
                if (!col[idx_ID]) continue;

                const kVal = parseFloat(col[idx_K]) || 0;
                const dVal = parseFloat(col[idx_D]) || 0;
                const biasVal = parseFloat(col[idx_Bias]) || 0;
                const isTrendUp = (col[idx_Trend] || "").toUpperCase() === "TRUE";

                // 策略邏輯
                let strategy = "📊 持平：目前為標準續抱區間。";
                let biasClass = "";
                if (biasVal >= 0.035) { biasClass = "val-danger"; strategy = "⚠️ 警訊：短線過熱，切勿追高！"; }
                else if (biasVal <= -0.025) { biasClass = "val-success"; strategy = "💰 機會：進入超跌區，準備反彈。"; }
                else if (kVal < 25 && isTrendUp) { strategy = "🔥 強勢：底部確認，一週勝率高！"; }

                let theme = (col[idx_ID].includes('2330')) ? 'red' : ((col[idx_ID].includes('00878') || col[idx_ID].includes('00929')) ? 'green' : 'blue');

                grid.innerHTML += `
                    <div class="card ${theme}">
                        ${(kVal < 25 && isTrendUp) ? `<div class="win-badge">🔥 強力反彈</div>` : ''}
                        ${isTrendUp ? `<div class="trust-badge">⚡ 動能轉強</div>` : ''}
                        <div style="font-size:0.8em; color:#94a3b8;">${col[idx_ID]}</div>
                        <div style="font-size:1.6em; font-weight:bold;">${col[idx_Name]}</div>
                        <div class="price">${col[idx_Price]}</div>
                        <div class="kd-container">
                            <div style="text-align:center;"><span>K值</span><strong style="display:block; font-size:1.4em;">${kVal.toFixed(2)}</strong></div>
                            <div style="text-align:center;"><span>D值</span><strong style="display:block; font-size:1.4em;">${dVal.toFixed(2)}</strong></div>
                        </div>
                        <div class="extra-indicators">
                            <div class="ind-box"><span>5日乖離</span><span class="ind-val ${biasClass}">${(biasVal * 100).toFixed(2)}%</span></div>
                            <div class="ind-box"><span>動能偵測</span><span class="ind-val ${isTrendUp ? 'val-success' : ''}">${isTrendUp ? '📈 轉強' : '---'}</span></div>
                        </div>
                        <div class="strategy-box">
                            <span class="strategy-label">💡 實戰策略建議</span>
                            <span class="strategy-text">${strategy}</span>
                        </div>
                        <div class="signal ${kVal < 20 ? 'buy' : 'hold'}">${kVal < 20 ? '✅ 超跌買入區' : '⚪ 觀望續抱'}</div>
                    </div>`;
            }
            status.innerText = '✅ 數據同步成功：' + new Date().toLocaleTimeString();
        } catch (error) {
            status.innerText = '❌ 同步失敗';
            grid.innerHTML = `<div class="error-msg">🚨 <b>錯誤：</b> ${error.message}<br><br>請確認您的 Google 試算表已「發佈到網路」並選擇「CSV」格式。</div>`;
        }
    }

    updateDashboard();
    setInterval(updateDashboard, 60000); // 每一分鐘自動更新
</script>
</body>
</html>
