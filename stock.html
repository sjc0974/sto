<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資戰情監控儀表板</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; line-height: 1.6; }
        .header { text-align: center; padding: 20px 0 30px; }
        .header h1 { margin: 0; color: #38bdf8; font-size: 2.2em; text-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 16px; padding: 22px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-top: 6px solid #475569; }
        .card.red { border-top-color: #ef4444; }
        .card.blue { border-top-color: #3b82f6; }
        .card.green { border-top-color: #10b981; }
        .card.purple { border-top-color: #a855f7; }
        .symbol { font-size: 0.85em; color: #94a3b8; font-weight: 700; }
        .name { font-size: 1.5em; font-weight: bold; margin: 8px 0; }
        .price { font-size: 2.8em; font-weight: 800; margin: 12px 0; color: #f43f5e; }
        .kd-container { display: flex; justify-content: space-between; background: #334155; padding: 14px; border-radius: 12px; margin: 18px 0; }
        .kd-item strong { font-size: 1.3em; color: #fff; }
        .signal { padding: 14px; border-radius: 10px; font-weight: bold; text-align: center; }
        .buy { background: rgba(6, 78, 59, 0.8); color: #6ee7b7; } 
        .sell { background: rgba(127, 29, 29, 0.8); color: #fca5a5; }
        .hold { background: #334155; color: #94a3b8; }
        #update-status { font-size: 0.9em; color: #38bdf8; text-align: center; margin-bottom: 20px; }
        .error-msg { background: #450a0a; color: #fecaca; padding: 25px; border-radius: 12px; grid-column: 1/-1; }
    </style>
</head>
<body>

<div class="header">
    <h1>投資戰情監控中心</h1>
    <div id="update-status">正在連線至雲端資料庫...</div>
</div>

<div class="grid" id="stock-grid"></div>

<script>
    // 您的 CSV 連結 (已移除 gid 確保穩定)
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQI9cWbCYXiLFGXrnY0W58hsYR4Aral3PBL1Dg7FFe2UU_ad-IVhIwOakDwbBiCSfWaDY2l22EdOK_-/pub?output=csv';

    async function updateDashboard() {
        const grid = document.getElementById('stock-grid');
        const status = document.getElementById('update-status');

        try {
            // 使用 no-cache 確保數據最即時
            const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            if (!response.ok) throw new Error('HTTP 錯誤: ' + response.status);
            
            let rawData = await response.text();
            rawData = rawData.replace(/^\uFEFF/, "").trim(); // 移除隱藏字元
            
            const rows = rawData.split(/\r?\n/).map(row => row.split(','));

            grid.innerHTML = ''; 

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].map(c => c.replace(/"/g, '').trim());
                if (cols.length < 5) continue;

                const id = cols[0];      
                const name = cols[1];    
                const price = cols[2];   
                const kVal = parseFloat(cols[12]) || 0; // M欄
                const dVal = parseFloat(cols[13]) || 0; // N欄

                let style = 'hold'; let txt = '⚪ 觀望續抱';
                if (kVal > 0 && kVal < 20) { style = 'buy'; txt = '✅ 分批買入'; }
                else if (kVal > 80) { style = 'sell'; txt = '⚠️ 高檔風險'; }

                let theme = 'blue';
                if (id === '2330') theme = 'red';
                else if (id === '00878' || id === '00929') theme = 'green';
                else if (id === '009816') theme = 'purple';

                grid.innerHTML += `
                    <div class="card ${theme}">
                        <div class="symbol">TPE:${id}</div>
                        <div class="name">${name}</div>
                        <div class="price">${price}</div>
                        <div class="kd-container">
                            <div class="kd-item"><span>K值</span><strong>${kVal.toFixed(2)}</strong></div>
                            <div class="kd-item"><span>D值</span><strong>${dVal.toFixed(2)}</strong></div>
                        </div>
                        <div class="signal ${style}">${txt}</div>
                    </div>`;
            }
            status.innerText = '最後更新：' + new Date().toLocaleTimeString();

        } catch (error) {
            status.innerText = '同步失敗';
            grid.innerHTML = `<div class="error-msg">🚨 <b>數據讀取中斷：${error.message}</b><br><br>這通常是 Chrome 限制本地檔案抓取資料造成的。請改用 <b>Firefox</b> 打開，或上傳到 GitHub Pages。</div>`;
        }
    }

    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>
</body>
</html>
