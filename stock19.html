<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 短線高勝率戰情室 - 最終版</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; line-height: 1.6; }
        .header { text-align: center; padding: 20px 0 30px; }
        .header h1 { margin: 0; color: #38bdf8; font-size: 2em; }
        #status { font-size: 0.95em; color: #38bdf8; text-align: center; margin-bottom: 20px; font-weight: bold; padding: 10px; background: rgba(56, 189, 248, 0.1); border-radius: 8px; display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border-top: 6px solid #475569; position: relative; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card.red { border-top-color: #ef4444; }
        .card.blue { border-top-color: #3b82f6; }
        .card.green { border-top-color: #10b981; }
        .card.purple { border-top-color: #a855f7; }
        
        .win-badge { position: absolute; top: -12px; right: 15px; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 900; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .symbol { font-size: 0.8em; color: #94a3b8; font-weight: bold; }
        .name { font-size: 1.5em; font-weight: bold; margin: 5px 0; color: #fff; }
        
        .price-row { display: flex; align-items: baseline; gap: 10px; margin-top: 5px; }
        .price-now { font-size: 2.8em; font-weight: 800; color: #f43f5e; font-family: monospace; }
        .last-close { font-size: 0.9em; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 10px; }
        
        .kd-container { display: flex; justify-content: space-between; background: #334155; padding: 15px; border-radius: 14px; margin: 15px 0; }
        .kd-item span { display: block; font-size: 0.75em; color: #cbd5e1; margin-bottom: 3px; }
        .kd-item strong { font-size: 1.3em; color: #fff; }
        
        .extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .ind-box { background: rgba(15, 23, 42, 0.5); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #334155; font-size: 0.85em; }
        .ind-label { display: block; color: #94a3b8; font-size: 0.8em; margin-bottom: 2px; }
        .val-good { color: #10b981; font-weight: bold; }
        .val-normal { color: #f8fafc; font-weight: bold; }

        .signal { padding: 14px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 1.2em; margin-top: 10px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .buy { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
        .hold { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
        .sell { background: #7f1d1d; color: #fca5a5; }

        .target-info { font-size: 0.75em; color: #64748b; text-align: center; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <h1>ETF 短線戰情監控中心</h1>
    <span id="status">📡 啟動數據引擎...</span>
</div>

<div id="stock-grid" class="grid"></div>

<script>

        const grid = document.getElementById('stock-grid');
        const status = document.getElementById('status');

            if (!response.ok) throw new Error("網路連線異常");
            
            const
