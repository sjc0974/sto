<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 智能戰情監控中心 - 試算表同步版</title>
    <style>
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; margin: 0; }
        .header { text-align: center; padding-bottom: 20px; }
        #status { font-size: 0.9em; color: #38bdf8; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 16px; padding: 20px; border-top: 6px solid #475569; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        .name-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .price-now { font-size: 2.5em; font-weight: 800; color: #f43f5e; font-family: monospace; }
        .change-info { font-weight: bold; text-align: right; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .m-box { background: rgba(15, 23, 42, 0.4); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .m-label { display: block; font-size: 0.75em; color: #94a3b8; margin-bottom: 3px; }
        .m-val { font-weight: bold; font-size: 0.95em; color: #fff; }

        /* 顏色狀態 */
        .bg-alert-green { background: #064e3b !important; border-color: #10b981 !important; } /* 買點 */
        .bg-alert-red { background: #450a0a !important; border-color: #ef4444 !important; }   /* 過熱 */
        .bg-warning { background: #78350f !important; border-color: #f59e0b !important; }     /* 背離警示 */

        .advice-box { padding: 15px; border-radius: 12px; margin-top: 15px; font-weight: bold; border-left: 5px solid; }
        .adv-buy { background: #064e3b; color: #6ee7b7; border-color: #10b981; }  
        .adv-hold { background: #1e293b; color: #94a3b8; border-color: #475569; } 
        .adv-sell { background: #450a0a; color: #fca5a5; border-color: #ef4444; } 
        .adv-strong { background: #1e3a8a; color: #bfdbfe; border-color: #3b82f6; } 
        .adv-warn { background: #78350f; color: #fde68a; border-color: #f59e0b; }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
        .adv-star { background: #1e3a24; color: #fbbf24; border-color: #fbbf24; border-left: 8px solid #fbbf24; animation: pulse-gold 2s infinite; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color:#38bdf8;">ETF 智能多因子戰情室</h1>
    <div id="status">📡 數據解析中...</div>
</div>

<div class="grid" id="stock-grid"></div>

<script>
    // 請確保此 URL 與你的 Google 試算表發佈連結一致
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQI9cWbCYXiLFGXrnY0W58hsYR4Aral3PBL1Dg7FFe2UU_ad-IVhIwOakDwbBiCSfWaDY2l22EdOK_-/pub?gid=1124507852&single=true&output=csv';

    async function updateDashboard() {
        try {
            const resp = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await resp.text();
            const rows = text.split(/\r?\n/).filter(line => line.trim() !== "").map(line => {
                // 處理 CSV 逗號與引號
                return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
            });

            // --- 根據你的截圖精確定義索引 (A=0, B=1...) ---
            const idx = {
                id: 0,      // A: 代號
                name: 1,    // B: 名稱
                price: 2,   // C: 當前價格
                k: 6,       // G: K值
                d: 7,       // H: D值
                vol: 11,    // L: 成交量萎縮 (TRUE/FALSE)
                bias: 12,   // M: 5日乖離率
                wms: 13,    // N: 威廉指標 (你的表是負數，如 -4.6)
                macd: 14,   // O: MACD 柱狀圖趨勢 (TRUE=轉強)
                last: 16    // Q: 昨收價
            };

            let html = '';
            for (let i = 1; i < rows.length; i++) {
                const col = rows[i];
                if (!col[idx.id] || col[idx.id] === "代號") continue;

                const n = (v) => {
                    if (!v || v === "" || v === "#N/A") return 0;
                    return parseFloat(v.replace(/[^-0-9.]/g, '')) || 0;
                };
                
                const price = n(col[idx.price]);
                const last = n(col[idx.last]);
                const kVal = n(col[idx.k]);
                const dVal = n(col[idx.d]);
                const bias = n(col[idx.bias]); // 假設小數點，如 0.0139 代表 1.39%
                const wms = n(col[idx.wms]);   // 你的表負值越接近 0 越熱
                const isMacdUp = String(col[idx.macd]).toUpperCase() === "TRUE";
                const isVolDry = String(col[idx.vol]).toUpperCase() === "TRUE";

                const diff = (price - last);
                const pct = last !== 0 ? ((diff / last) * 100).toFixed(2) : "0.00";

                // --- 智慧判斷邏輯 (針對領息進場時機) ---
                let advClass = 'adv-hold';
                let advTitle = '⚪ 觀望整理';
                let advDesc = '目前各項指標平穩，不急於進場，耐心等待回調。';

                // 買點判定：超跌區 (K < 25 且 威廉指標很負，例如 < -80)
                if (kVal < 25 && wms < -80) {
                    advClass = 'adv-star';
                    advTitle = '🌟 強力買入訊號';
                    advDesc = '指標進入嚴重超跌區，填息安全邊際極高，建議分批佈局。';
                } 
                // 過熱判定：(00878 現況：K > 60 且 威廉 > -20 且 乖離 > 1%)
                else if (kVal > 60 && wms > -20 && bias > 0.01) {
                    if (isVolDry) {
                        advClass = 'adv-warn';
                        advTitle = '⚠️ 短線過熱警示';
                        advDesc = `量能萎縮但股價維持高位，5日乖離(${ (bias*100).toFixed(2) }%)已高，建議等回踩昨收再考慮。`;
                    } else {
                        advClass = 'adv-strong';
                        advTitle = '🔥 強勢多頭噴發';
                        advDesc = '多頭動能強勁，持股者續抱看填息，空手者切勿在此追高。';
                    }
                }
                // 找買點：縮量且低位
                else if (isVolDry && kVal < 40) {
                    advClass = 'adv-buy';
                    advTitle = '📉 縮量找支撐';
                    advDesc = '成交量萎縮代表賣壓衰竭，若 MACD 轉強即是最佳買點。';
                }

                // 樣式動態顏色
                const kColor = kVal < 25 ? 'bg-alert-green' : (kVal > 80 ? 'bg-alert-red' : '');
                const wmsColor = wms < -80 ? 'bg-alert-green' : (wms > -10 ? 'bg-alert-red' : '');
                const biasColor = bias > 0.03 ? 'bg-alert-red' : (bias < -0.03 ? 'bg-alert-green' : '');
                const macdColor = isMacdUp ? 'bg-alert-green' : '';

                html += `
                    <div class="card ${diff >= 0 ? 'red' : 'blue'}">
                        <div class="name-row">
                            <div>
                                <div style="font-size:0.8em; color:#94a3b8;">${col[idx.id]}</div>
                                <div style="font-size:1.3em; font-weight:bold;">${col[idx.name]}</div>
                            </div>
                            <div class="change-info" style="color:${diff >= 0 ? '#ef4444' : '#10b981'}">
                                ${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff).toFixed(2)} (${pct}%)
                            </div>
                        </div>

                        <div class="price-now">${price.toFixed(2)}</div>

                        <div class="metrics-grid">
                            <div class="m-box ${kColor}"><span class="m-label">K / D 值</span><span class="m-val">${kVal.toFixed(1)} / ${dVal.toFixed(1)}</span></div>
                            <div class="m-box ${wmsColor}"><span class="m-label">威廉指標</span><span class="m-val">${wms.toFixed(1)}</span></div>
                            <div class="m-box ${biasColor}"><span class="m-label">5日乖離</span><span class="m-val">${(bias*100).toFixed(2)}%</span></div>
                            <div class="m-box ${macdColor}"><span class="m-label">MACD動能</span><span class="m-val">${isMacdUp ? '⤴ 轉強' : '⤵ 走弱'}</span></div>
                            <div class="m-box ${isVolDry ? 'bg-warning' : ''}"><span class="m-label">成交量能</span><span class="m-val">${isVolDry ? '📉 萎縮' : '正常'}</span></div>
                            <div class="m-box"><span class="m-label">昨日收盤</span><span class="m-val">${last.toFixed(2)}</span></div>
                        </div>

                        <div class="advice-box ${advClass}">
                            <div style="font-size:1.05em; margin-bottom:4px;">${advTitle}</div>
                            <div style="font-size:0.85em; font-weight:normal; line-height:1.4;">${advDesc}</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('stock-grid').innerHTML = html;
            document.getElementById('status').innerText = '✅ 自動同步中：' + new Date().toLocaleTimeString();
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = '❌ 讀取試算表失敗，請檢查網路或 URL';
        }
    }

    updateDashboard();
    setInterval(updateDashboard, 30000); // 每 30 秒自動更新一次
</script>
</body>
</html>
